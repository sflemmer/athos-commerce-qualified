                <div key={i} className="card" style={{padding: '20px 24px'}}>
                  <p style={{fontSize: '14.5px', fontWeight: 700, color: 'var(--navy)', marginBottom: '4px'}}>{t.t}</p>
                  <p style={{fontSize: '13px', color: 'var(--dim)'}}>{t.s}</p>
                </div>
              ))}
            </div>
            <div className="card-signature" style={{padding: '26px'}}>
              <p className="eyebrow" style={{color: 'rgba(255,255,255,0.75)', marginBottom: '10px'}}>NEXT STEP</p>
              <p style={{fontSize: '16px', fontWeight: 700, color: 'white', lineHeight: '1.5', marginBottom: '20px'}}>
                A working session to drop your real funnel numbers into this model — and an introduction to the PSG team that ran this same evaluation. We're actively arranging it.
              </p>
              <a href="#" className="btn-label" style={{background: 'white', color: 'var(--navy)', padding: '13px 22px', borderRadius: '12px', textAlign: 'center', textDecoration: 'none', display: 'inline-block'}}>
                LET'S GET THE REAL NUMBERS IN
              </a>
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

function Footer() {
  return (
    <footer style={{background: 'white', borderTop: '1px solid var(--border)', padding: '40px 0'}}>
      <div className="max-w-7xl mx-auto px-6" style={{display: 'flex', flexWrap: 'wrap', alignItems: 'center', justifyContent: 'space-between', gap: '14px'}}>
        <div style={{display: 'flex', alignItems: 'center', gap: '10px'}}>
          <AthosMark size={18} />
          <span className="display font-bold" style={{fontSize: '13px', color: 'var(--dim)'}}>athos commerce</span>
          <span style={{color: 'var(--border)'}}>×</span>
          <span style={{fontSize: '13px', color: 'var(--dim)'}}>Qualified, from Salesforce</span>
        </div>
        <p style={{fontSize: '11px', color: 'var(--dim)'}}>Prepared July 2026</p>
      </div>
    </footer>
  );
}

function App() {
  return (
    <div>
      <Header />
      <Hero />
      <Reference />
      <Thesis />
      <Maturity />
      <Diverge />
      <Turnkey />
      <ROI />
      <Proof />
      <Closing />
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
